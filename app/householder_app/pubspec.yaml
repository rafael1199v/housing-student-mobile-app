name: householder_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

resolution: workspace

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Shared framework-agnostic plumbing (session, network, storage, roles,
  # errors, config). Consumed from its own repo; pinned to a release branch.
  housing_core:
    git:
      url: https://github.com/rafael1199v/housing-core-mobile.git
      ref: release/1.1.2

  # Role-neutral auth feature (login/register/Google/confirm-email), shared
  # with the shell. Local workspace member.
  housing_auth: ^0.1.0

  # Localization (gen-l10n: ARB files -> AppLocalizations).
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Web URL strategy (usePathUrlStrategy) for clean deep-link URLs.
  flutter_web_plugins:
    sdk: flutter

  housing_design_system:
    git:
      url: https://github.com/rafael1199v/housing-design-system.git
      ref: release/1.2.1

  # Networking (Retrofit over Dio)
  dio: ^5.7.0
  retrofit: ^4.9.0
  json_annotation: ^4.9.0

  # Secure token storage
  flutter_secure_storage: ^9.2.4

  # Lightweight persistence for non-sensitive prefs (e.g. theme mode).
  shared_preferences: ^2.3.0

  # Dependency injection
  get_it: ^8.0.3

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Routing (^17 to match the bundle / student app; one version per workspace)
  go_router: ^17.3.0

  # Launch external apps/URLs (e.g. "Open in Maps" from room detail).
  url_launcher: ^6.3.0

  # Maps + location. Web support for maps is
  # endorsed via google_maps_flutter_web; geolocator works web+mobile;
  # geocoding is mobile-only (guarded with kIsWeb).
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.0
  geocoding: ^3.0.0

  # web support (secret injection)
  web: ^1.1.1

  # Image selection for room photos (gallery/camera, handles web).
  image_picker: ^1.1.0

  # Runtime permissions (camera capture) + open app settings on permanent denial.
  permission_handler: ^11.3.1

  # Real-time chat: ASP.NET Core SignalR client (web + mobile).
  signalr_netcore: ^1.3.7

  # Local chat cache
  sqflite: ^2.3.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  retrofit_generator: ^10.2.3
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  generate: true
