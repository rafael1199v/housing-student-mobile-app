name: householder_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

resolution: workspace

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  householder_design_system:
    path: ../../packages/householder_design_system

  # Networking (Retrofit over Dio)
  dio: ^5.7.0
  retrofit: ^4.9.0
  json_annotation: ^4.9.0

  # Secure token storage
  flutter_secure_storage: ^9.2.4

  # Dependency injection
  get_it: ^8.0.3

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Routing
  go_router: ^16.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  retrofit_generator: ^10.2.3
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
